<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#1E130C" />
  <title>Bingo della festa · Pietro &amp; Martina</title>

  <link href="https://fonts.googleapis.com/css2?family=Diphylleia&display=swap" rel="stylesheet" />
  <link href="https://fonts.cdnfonts.com/css/brittany-signature" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    .bingo-page {
      max-width: 560px;
      margin: 0 auto;
      padding: 1rem .8rem 3rem;
      position: relative;
      z-index: 1;
    }

    .bingo-intro {
      text-align: center;
      font-family: 'Diphylleia', serif;
      font-size: clamp(.85rem, 2.4vw, .95rem);
      color: var(--text-mid);
      line-height: 1.55;
      max-width: 460px;
      margin: 0 auto 1rem;
    }

    /* HUD */
    .bingo-hud {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-bottom: 1rem;
      padding: .65rem .8rem;
      background: var(--warm-white);
      border: 1px solid rgba(200, 148, 58, .3);
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(90, 60, 44, .08);
    }

    .bingo-hud .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .bingo-hud .label {
      font-family: 'Diphylleia', serif;
      font-size: .58rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .bingo-hud .value {
      font-family: 'Diphylleia', serif;
      font-size: 1.2rem;
      color: var(--rust);
      line-height: 1.2;
    }

    /* Griglia 5x5 */
    .bingo-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: clamp(.25rem, 1.2vw, .45rem);
      max-width: 480px;
      margin: 0 auto;
    }

    .b-cell {
      position: relative;
      aspect-ratio: 1 / 1;
      background: var(--warm-white);
      border: 1.5px solid rgba(200, 148, 58, .3);
      border-radius: 10px;
      cursor: pointer;
      transition: background .25s, border-color .25s, transform .15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: .25rem .15rem;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .b-cell:active {
      transform: scale(.95);
    }

    .b-emoji {
      font-size: clamp(1.3rem, 5.5vw, 1.7rem);
      line-height: 1;
      margin-bottom: .1rem;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, .1));
    }

    .b-text {
      font-family: 'Diphylleia', serif;
      font-size: clamp(.42rem, 1.5vw, .58rem);
      line-height: 1.15;
      color: var(--text-mid);
      letter-spacing: .01em;
      max-height: 3.4em;
      overflow: hidden;
    }

    /* Free cell (centro) */
    .b-cell.free {
      background: linear-gradient(135deg, var(--gold-dark) 0%, var(--terracotta) 100%);
      border-color: var(--gold);
      color: #fff;
    }

    .b-cell.free .b-text {
      color: rgba(255, 255, 255, .95);
      font-weight: bold;
    }

    /* Cell marcata */
    .b-cell.marked {
      background: linear-gradient(135deg, rgba(106, 107, 56, .15) 0%, rgba(106, 107, 56, .25) 100%);
      border-color: var(--olive);
    }

    .b-cell.marked .b-text {
      color: var(--olive);
    }

    .b-cell.marked::after {
      content: '✓';
      position: absolute;
      top: 4px;
      right: 5px;
      color: var(--olive);
      font-size: clamp(.7rem, 2.5vw, .9rem);
      font-weight: bold;
      line-height: 1;
      animation: pop .4s ease both;
    }

    /* Cell in linea vincente */
    .b-cell.win-line {
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
      border-color: var(--gold-dark);
      box-shadow: 0 0 18px rgba(200, 148, 58, .5);
      animation: winGlow 1.4s ease-in-out infinite;
    }

    .b-cell.win-line .b-text {
      color: var(--brown-dark);
      font-weight: bold;
    }

    .b-cell.win-line::after {
      color: var(--brown-dark);
    }

    @keyframes winGlow {

      0%,
      100% {
        box-shadow: 0 0 12px rgba(200, 148, 58, .35);
      }

      50% {
        box-shadow: 0 0 22px rgba(200, 148, 58, .7);
      }
    }

    /* Modal dettaglio missione */
    .mission-modal {
      position: fixed;
      inset: 0;
      background: rgba(30, 19, 12, .82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1.5rem;
    }

    .mission-modal.show {
      display: flex;
      animation: fadeIn .25s ease;
    }

    .mission-card {
      background: var(--warm-white);
      border: 1.5px solid var(--gold);
      border-radius: 22px;
      padding: 2rem 1.6rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .35);
      animation: pop .4s ease both;
    }

    .mission-emoji {
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: .6rem;
    }

    .mission-text {
      font-family: 'Diphylleia', serif;
      font-size: clamp(1.05rem, 3.4vw, 1.2rem);
      color: var(--text-dark);
      line-height: 1.5;
      margin-bottom: 1.6rem;
    }

    .mission-buttons {
      display: flex;
      flex-direction: column;
      gap: .7rem;
      align-items: center;
    }

    /* BINGO overlay */
    .bingo-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30, 19, 12, .9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1.5rem;
    }

    .bingo-overlay.show {
      display: flex;
      animation: fadeIn .3s ease;
    }

    .bingo-celebration {
      text-align: center;
      animation: pop .5s ease both;
    }

    .bingo-big {
      font-family: 'Brittany Signature', 'Brittany', cursive;
      font-style: normal;
      font-size: clamp(4.5rem, 22vw, 8rem);
      color: var(--gold-light);
      line-height: .9;
      text-shadow: 0 4px 18px rgba(0, 0, 0, .5);
      animation: bingoWiggle 1.2s ease-in-out infinite;
    }

    @keyframes bingoWiggle {

      0%,
      100% {
        transform: rotate(-3deg) scale(1);
      }

      50% {
        transform: rotate(3deg) scale(1.06);
      }
    }

    .bingo-sub {
      font-family: 'Diphylleia', serif;
      font-size: clamp(1rem, 3vw, 1.15rem);
      color: rgba(247, 240, 227, .9);
      letter-spacing: .12em;
      margin: 1.2rem 0 1.8rem;
    }

    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 199;
      inset: 0;
      overflow: hidden;
    }

    /* Reset button */
    .reset-row {
      text-align: center;
      margin-top: 1.5rem;
    }

    .reset-btn {
      background: transparent;
      border: 1px dashed rgba(158, 61, 34, .35);
      color: var(--rust);
      font-family: 'Diphylleia', serif;
      font-size: .8rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: .6rem 1.4rem;
      border-radius: 50px;
      cursor: pointer;
      transition: background .2s, border-color .2s;
    }

    .reset-btn:hover {
      background: rgba(158, 61, 34, .08);
      border-style: solid;
    }
  </style>
</head>

<body>

  <canvas id="leaves-canvas" aria-hidden="true"></canvas>

  <header class="game-header">
    <a href="index.html" class="back-btn" aria-label="Torna al menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      Menu
    </a>
    <h1 class="game-title">Bingo della festa</h1>
  </header>

  <main class="bingo-page">

    <p class="bingo-intro">
      Tocca una missione per leggerla. Quando l'hai completata durante la festa, segnala come fatta. Completa una riga,
      colonna o diagonale per fare <strong>BINGO!</strong>
    </p>

    <div class="bingo-hud">
      <div class="stat">
        <span class="label">Completate</span>
        <span class="value" id="hudDone">1/25</span>
      </div>
      <div class="stat">
        <span class="label">Bingo</span>
        <span class="value" id="hudBingo">0</span>
      </div>
    </div>

    <div class="bingo-grid" id="grid" role="grid"></div>

    <div class="reset-row">
      <button class="reset-btn" id="resetBtn">↻ Ricomincia</button>
    </div>

  </main>

  <!-- Modale missione -->
  <div class="mission-modal" id="missionModal" role="dialog" aria-modal="true">
    <div class="mission-card">
      <div class="mission-emoji" id="missionEmoji">🎯</div>
      <p class="mission-text" id="missionText">…</p>
      <div class="mission-buttons">
        <button class="btn-primary" id="markDoneBtn">L'ho completata!</button>
        <button class="btn-secondary" id="cancelBtn">Chiudi</button>
      </div>
    </div>
  </div>

  <!-- BINGO! -->
  <div class="bingo-overlay" id="bingoOverlay">
    <div class="bingo-celebration">
      <div class="bingo-big">BINGO!</div>
      <p class="bingo-sub">Hai completato una linea!</p>
      <button class="btn-primary" id="closeBingoBtn">Continua</button>
    </div>
  </div>
  <div class="confetti" id="confetti" aria-hidden="true"></div>

  <script>
    /* ══════════════════════════════════════
       25 MISSIONI A TEMA FESTA MATRIMONIO
       ══════════════════════════════════════ */
    const MISSIONS = [
      { e: '👔', t: 'Trova qualcuno con la cravatta più colorata' },
      { e: '🤳', t: 'Fai un selfie con gli sposi' },
      { e: '💃', t: 'Balla con uno sconosciuto' },
      { e: '🥂', t: 'Brinda con la suocera (o un suocero)' },
      { e: '🍰', t: 'Scatta una foto davanti alla torta' },

      { e: '👨‍👩‍👧', t: 'Conosci un parente degli sposi che non hai mai visto' },
      { e: '💐', t: 'Stai vicino quando viene lanciato il bouquet' },
      { e: '✈️', t: 'Trova chi ha viaggiato di più per essere qui' },
      { e: '💕', t: 'Fatti raccontare come si sono conosciuti gli sposi' },
      { e: '🐌', t: 'Balla un lento (anche da solo!)' },

      { e: '🍽️', t: 'Assaggia almeno 3 portate diverse' },
      { e: '🎵', t: 'Scopri la canzone preferita degli sposi' },
      { e: '❤️', t: 'Sei qui per festeggiare!' }, // CENTRO LIBERO (index 12)
      { e: '🤝', t: 'Presentati a una persona che non conosci' },
      { e: '🎭', t: 'Scatta una foto con una posa buffa' },

      { e: '🤵', t: 'Balla con lo sposo o con la sposa' },
      { e: '😂', t: 'Racconta a qualcuno una storia divertente sugli sposi' },
      { e: '📅', t: 'Indovina l\'anno in cui Pietro e Martina si sono conosciuti' },
      { e: '📱', t: 'Posta una foto della festa sui social' },
      { e: '🕺', t: 'Trova qualcuno che balla peggio di te' },

      { e: '🍾', t: 'Bevi un calice di prosecco' },
      { e: '🕯️', t: 'Conta quante candele ci sono sulla torta' },
      { e: '🍂', t: 'Trova un fiore o una decorazione autunnale' },
      { e: '👯', t: 'Scopri il nome di tutti i testimoni' },
      { e: '✨', t: 'Augura agli sposi una cosa speciale' }
    ];
    /* ══════════════════════════════════════ */

    /* ── Falling Leaves ── */
    (function () {
      const canvas = document.getElementById('leaves-canvas');
      const ctx = canvas.getContext('2d');
      const SHAPES = ['🍂', '🍁', '🍃'];
      const LEAVES = [];
      const COUNT = window.innerWidth < 500 ? 10 : 18;
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);
      for (let i = 0; i < COUNT; i++) {
        LEAVES.push({
          x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight * -1.5,
          size: 12 + Math.random() * 18, speed: .3 + Math.random() * .6,
          drift: (Math.random() - .5) * .7, rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - .5) * .022,
          emoji: SHAPES[Math.floor(Math.random() * SHAPES.length)],
          alpha: .18 + Math.random() * .3,
          swing: Math.random() * Math.PI * 2, swingS: .35 + Math.random() * .55,
        });
      }
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        LEAVES.forEach(l => {
          l.swing += .011 * l.swingS;
          l.x += l.drift + Math.sin(l.swing) * .55;
          l.y += l.speed; l.rot += l.rotV;
          if (l.y > canvas.height + 40) { l.y = -40; l.x = Math.random() * canvas.width; }
          ctx.save(); ctx.translate(l.x, l.y); ctx.rotate(l.rot);
          ctx.globalAlpha = l.alpha; ctx.font = `${l.size}px serif`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(l.emoji, 0, 0); ctx.restore();
        });
        requestAnimationFrame(animate);
      }
      animate();
    })();

    /* ══════════════════════════════════════
       BINGO LOGIC
       ══════════════════════════════════════ */
    (function () {
      const grid = document.getElementById('grid');
      const hudDone = document.getElementById('hudDone');
      const hudBingo = document.getElementById('hudBingo');
      const modal = document.getElementById('missionModal');
      const missionEmoji = document.getElementById('missionEmoji');
      const missionText = document.getElementById('missionText');
      const markDoneBtn = document.getElementById('markDoneBtn');
      const cancelBtn = document.getElementById('cancelBtn');
      const bingoOverlay = document.getElementById('bingoOverlay');
      const closeBingoBtn = document.getElementById('closeBingoBtn');
      const resetBtn = document.getElementById('resetBtn');
      const confettiEl = document.getElementById('confetti');

      const FREE_INDEX = 12;
      const STORAGE_KEY = 'bingo_state_v1';

      // Stato: array di 25 booleani + count bingo precedentemente celebrati
      let state = loadState();

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed.marked) && parsed.marked.length === 25) {
              parsed.marked[FREE_INDEX] = true;
              return parsed;
            }
          }
        } catch (e) { }
        return defaultState();
      }

      function defaultState() {
        const marked = new Array(25).fill(false);
        marked[FREE_INDEX] = true;
        return { marked, celebratedLines: [] };
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      let currentCell = null;

      function buildGrid() {
        grid.innerHTML = '';
        MISSIONS.forEach((m, i) => {
          const cell = document.createElement('div');
          cell.className = 'b-cell';
          cell.setAttribute('role', 'gridcell');
          cell.dataset.index = i;
          if (i === FREE_INDEX) cell.classList.add('free');
          if (state.marked[i]) cell.classList.add('marked');

          cell.innerHTML = `
            <span class="b-emoji" aria-hidden="true">${m.e}</span>
            <span class="b-text">${m.t}</span>
          `;

          cell.addEventListener('click', () => openMission(i));
          grid.appendChild(cell);
        });
        updateHUD();
        highlightWinLines();
      }

      function openMission(i) {
        if (i === FREE_INDEX) return; // non si può togliere il centro
        currentCell = i;
        const m = MISSIONS[i];
        missionEmoji.textContent = m.e;
        missionText.textContent = m.t;
        markDoneBtn.textContent = state.marked[i] ? 'Annulla' : 'L\'ho completata!';
        modal.classList.add('show');
      }

      function closeMission() {
        modal.classList.remove('show');
        currentCell = null;
      }

      markDoneBtn.addEventListener('click', () => {
        if (currentCell === null) return;
        state.marked[currentCell] = !state.marked[currentCell];
        saveState();
        const cell = grid.querySelector(`[data-index="${currentCell}"]`);
        cell.classList.toggle('marked', state.marked[currentCell]);
        updateHUD();
        closeMission();
        // Check bingo dopo un piccolo delay (animazione check)
        setTimeout(checkBingo, 350);
      });

      cancelBtn.addEventListener('click', closeMission);
      modal.addEventListener('click', e => {
        if (e.target === modal) closeMission();
      });

      // ── LINEE VINCENTI ──
      function getLines() {
        const lines = [];
        // Righe
        for (let r = 0; r < 5; r++) lines.push([r * 5, r * 5 + 1, r * 5 + 2, r * 5 + 3, r * 5 + 4]);
        // Colonne
        for (let c = 0; c < 5; c++) lines.push([c, c + 5, c + 10, c + 15, c + 20]);
        // Diagonali
        lines.push([0, 6, 12, 18, 24]);
        lines.push([4, 8, 12, 16, 20]);
        return lines;
      }

      function lineKey(line) { return line.join('-'); }

      function checkBingo() {
        const lines = getLines();
        const newWins = [];
        for (const line of lines) {
          const complete = line.every(i => state.marked[i]);
          const key = lineKey(line);
          if (complete && !state.celebratedLines.includes(key)) {
            state.celebratedLines.push(key);
            newWins.push(line);
          }
        }
        if (newWins.length > 0) {
          saveState();
          updateHUD();
          highlightWinLines();
          celebrate();
        }
      }

      function highlightWinLines() {
        // pulisci classe
        grid.querySelectorAll('.b-cell').forEach(c => c.classList.remove('win-line'));
        // applica a tutti gli indici delle linee celebrate
        const allWinIdx = new Set();
        getLines().forEach(line => {
          if (state.celebratedLines.includes(lineKey(line))) {
            line.forEach(i => allWinIdx.add(i));
          }
        });
        allWinIdx.forEach(i => {
          const c = grid.querySelector(`[data-index="${i}"]`);
          if (c) c.classList.add('win-line');
        });
      }

      function updateHUD() {
        const count = state.marked.filter(Boolean).length;
        hudDone.textContent = `${count}/25`;
        hudBingo.textContent = state.celebratedLines.length;
      }

      // ── CELEBRAZIONE BINGO ──
      function celebrate() {
        bingoOverlay.classList.add('show');
        spawnConfetti();
      }

      closeBingoBtn.addEventListener('click', () => {
        bingoOverlay.classList.remove('show');
      });

      function spawnConfetti() {
        confettiEl.innerHTML = '';
        const colors = ['#C8943A', '#E0BC72', '#9E3D22', '#C05828', '#6A6B38'];
        for (let i = 0; i < 60; i++) {
          const piece = document.createElement('div');
          const size = 6 + Math.random() * 8;
          const left = Math.random() * 100;
          const delay = Math.random() * .5;
          const duration = 1.5 + Math.random() * 1.5;
          const color = colors[Math.floor(Math.random() * colors.length)];
          const rot = Math.random() * 360;
          piece.style.cssText = `
            position: absolute;
            top: -20px;
            left: ${left}%;
            width: ${size}px;
            height: ${size * 1.6}px;
            background: ${color};
            border-radius: 2px;
            transform: rotate(${rot}deg);
            animation: confettiFall ${duration}s ${delay}s linear forwards;
          `;
          confettiEl.appendChild(piece);
        }
        setTimeout(() => { confettiEl.innerHTML = ''; }, 4500);
      }

      // Inietta keyframe confetti
      const styleEl = document.createElement('style');
      styleEl.textContent = `
        @keyframes confettiFall {
          to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
      `;
      document.head.appendChild(styleEl);

      // ── RESET ──
      resetBtn.addEventListener('click', () => {
        if (confirm('Sei sicuro di voler azzerare tutte le missioni completate?')) {
          state = defaultState();
          saveState();
          buildGrid();
        }
      });

      // ── ESC chiude modali ──
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          closeMission();
          bingoOverlay.classList.remove('show');
        }
      });

      // INIT
      buildGrid();
    })();
  </script>
</body>

</html>
