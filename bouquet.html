<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1E130C" />
  <title>Acchiappa il bouquet · Pietro &amp; Martina</title>

  <link href="https://fonts.googleapis.com/css2?family=Diphylleia&display=swap" rel="stylesheet" />
  <link href="https://fonts.cdnfonts.com/css/brittany-signature" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      overscroll-behavior: none;
      touch-action: none;
    }

    .bouquet-page {
      max-width: 560px;
      margin: 0 auto;
      padding: .75rem 1rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* HUD */
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
      margin-bottom: .8rem;
      padding: .65rem .9rem;
      background: var(--warm-white);
      border: 1px solid rgba(200, 148, 58, .3);
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(90, 60, 44, .08);
    }

    .hud-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .hud-label {
      font-family: 'Diphylleia', serif;
      font-size: .56rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .hud-value {
      font-family: 'Diphylleia', serif;
      font-size: 1.25rem;
      color: var(--rust);
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }

    .lives {
      letter-spacing: -.05em;
      font-size: 1.1rem;
    }

    .lives .lost {
      opacity: .25;
      filter: grayscale(1);
    }

    /* Canvas area */
    .game-area {
      position: relative;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 3 / 4.4;
      margin: 0 auto;
      background: linear-gradient(180deg, #2c1c10 0%, #1E130C 100%);
      border: 1.5px solid var(--gold-dark);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 36px rgba(0, 0, 0, .35), inset 0 0 80px rgba(200, 148, 58, .12);
      touch-action: none;
      cursor: grab;
    }

    .game-area:active {
      cursor: grabbing;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Schermate overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(30, 19, 12, .92);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      z-index: 10;
    }

    .overlay.show {
      display: flex;
      animation: fadeIn .35s ease;
    }

    .overlay h2 {
      font-family: 'Brittany Signature', 'Brittany', cursive;
      font-style: normal;
      font-size: clamp(2.2rem, 9vw, 3rem);
      color: var(--gold-light);
      line-height: 1;
      margin-bottom: .4rem;
    }

    .overlay p {
      font-family: 'Diphylleia', serif;
      color: rgba(247, 240, 227, .85);
      font-size: clamp(.9rem, 2.6vw, 1rem);
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 1.5rem;
    }

    .overlay .final-score {
      font-family: 'Diphylleia', serif;
      font-size: clamp(2.8rem, 12vw, 4rem);
      color: var(--gold-light);
      line-height: 1;
      margin-bottom: .3rem;
      font-variant-numeric: tabular-nums;
    }

    .overlay .final-label {
      font-family: 'Diphylleia', serif;
      font-size: .72rem;
      letter-spacing: .26em;
      text-transform: uppercase;
      color: var(--gold-light);
      opacity: .65;
      margin-bottom: 1.8rem;
    }

    .overlay-buttons {
      display: flex;
      flex-direction: column;
      gap: .7rem;
      align-items: center;
    }

    .legend {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: .8rem;
      justify-content: center;
      font-family: 'Diphylleia', serif;
      font-size: .82rem;
      color: rgba(247, 240, 227, .8);
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
    }

    .legend .good {
      color: var(--gold-light);
    }

    .legend .bad {
      color: #d99a8b;
    }

    /* Pulse hint per il primo touch */
    .touch-hint {
      position: absolute;
      bottom: 18%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Diphylleia', serif;
      font-size: .85rem;
      color: rgba(247, 240, 227, .7);
      letter-spacing: .12em;
      text-transform: uppercase;
      pointer-events: none;
      animation: hintPulse 1.8s ease-in-out infinite;
    }

    @keyframes hintPulse {

      0%,
      100% {
        opacity: .4;
        transform: translateX(-50%) translateY(0);
      }

      50% {
        opacity: 1;
        transform: translateX(-50%) translateY(-6px);
      }
    }

    .touch-hint.hidden {
      display: none;
    }
  </style>
</head>

<body>

  <canvas id="leaves-canvas" aria-hidden="true"></canvas>

  <header class="game-header">
    <a href="index.html" class="back-btn" aria-label="Torna al menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      Menu
    </a>
    <h1 class="game-title">Acchiappa</h1>
  </header>

  <main class="bouquet-page">

    <div class="hud">
      <div class="hud-block">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="hudScore">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">Record</span>
        <span class="hud-value" id="hudBest">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">Vite</span>
        <span class="hud-value lives" id="hudLives">❤️❤️❤️</span>
      </div>
    </div>

    <div class="game-area" id="gameArea">
      <canvas id="gameCanvas"></canvas>

      <!-- Schermo START -->
      <div class="overlay show" id="startOverlay">
        <h2>Acchiappa il bouquet</h2>
        <p>
          Trascina il dito per muovere le mani.<br>
          Prendi tutto ciò che è prezioso, evita le foglie!
        </p>
        <div class="legend">
          <span class="good">💐 💍 ❤️ 🥂 = bene</span>
          <span class="bad">🍂 🍁 = no!</span>
        </div>
        <div class="overlay-buttons" style="margin-top: 1.5rem;">
          <button class="btn-primary" id="startBtn">Inizia</button>
        </div>
      </div>

      <!-- Schermo GAME OVER -->
      <div class="overlay" id="overOverlay">
        <h2 id="overTitle">Game Over</h2>
        <div class="final-score" id="overScore">0</div>
        <div class="final-label">Punteggio</div>
        <p id="overMsg">…</p>
        <div class="overlay-buttons">
          <button class="btn-primary" id="restartBtn">Rigioca</button>
          <a href="index.html" class="btn-secondary">← Altri giochi</a>
        </div>
      </div>

      <span class="touch-hint hidden" id="touchHint">↓ Trascina qui ↓</span>
    </div>

  </main>

  <script>
    /* ── Falling Leaves di sfondo ── */
    (function () {
      const canvas = document.getElementById('leaves-canvas');
      const ctx = canvas.getContext('2d');
      const SHAPES = ['🍂', '🍁', '🍃'];
      const LEAVES = [];
      const COUNT = window.innerWidth < 500 ? 8 : 14;
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);
      for (let i = 0; i < COUNT; i++) {
        LEAVES.push({
          x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight * -1.5,
          size: 12 + Math.random() * 16, speed: .25 + Math.random() * .5,
          drift: (Math.random() - .5) * .6, rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - .5) * .02,
          emoji: SHAPES[Math.floor(Math.random() * SHAPES.length)],
          alpha: .12 + Math.random() * .22,
          swing: Math.random() * Math.PI * 2, swingS: .35 + Math.random() * .5,
        });
      }
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        LEAVES.forEach(l => {
          l.swing += .011 * l.swingS;
          l.x += l.drift + Math.sin(l.swing) * .5;
          l.y += l.speed; l.rot += l.rotV;
          if (l.y > canvas.height + 40) { l.y = -40; l.x = Math.random() * canvas.width; }
          ctx.save(); ctx.translate(l.x, l.y); ctx.rotate(l.rot);
          ctx.globalAlpha = l.alpha; ctx.font = `${l.size}px serif`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(l.emoji, 0, 0); ctx.restore();
        });
        requestAnimationFrame(animate);
      }
      animate();
    })();

    /* ══════════════════════════════════════
       GIOCO: Acchiappa il bouquet
       ══════════════════════════════════════ */
    (function () {
      const area = document.getElementById('gameArea');
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');

      const hudScore = document.getElementById('hudScore');
      const hudBest = document.getElementById('hudBest');
      const hudLives = document.getElementById('hudLives');

      const startOverlay = document.getElementById('startOverlay');
      const overOverlay = document.getElementById('overOverlay');
      const overTitle = document.getElementById('overTitle');
      const overScore = document.getElementById('overScore');
      const overMsg = document.getElementById('overMsg');
      const startBtn = document.getElementById('startBtn');
      const restartBtn = document.getElementById('restartBtn');
      const touchHint = document.getElementById('touchHint');

      // Logica DPR (Retina-friendly)
      let W = 0, H = 0, DPR = 1;
      function resizeCanvas() {
        DPR = Math.min(window.devicePixelRatio || 1, 2);
        const rect = area.getBoundingClientRect();
        W = rect.width;
        H = rect.height;
        canvas.width = Math.round(W * DPR);
        canvas.height = Math.round(H * DPR);
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));

      // Tipi oggetti
      const GOODS = [
        { emoji: '💐', pts: 10, w: 0.32 },
        { emoji: '💍', pts: 25, w: 0.08 },
        { emoji: '❤️', pts: 5, w: 0.28 },
        { emoji: '🥂', pts: 10, w: 0.18 },
        { emoji: '🕊️', pts: 15, w: 0.14 },
      ];
      const BADS = [
        { emoji: '🍂' },
        { emoji: '🍁' },
      ];

      // Stato gioco
      let items = [];
      let score = 0;
      let lives = 3;
      let best = parseInt(localStorage.getItem('bouquet_best') || '0', 10);
      let running = false;
      let lastSpawn = 0;
      let spawnInterval = 900;
      let baseFallSpeed = 110;       // px/sec
      let elapsed = 0;
      let lastTime = 0;
      let paddleX = 0;
      let paddleTargetX = 0;
      let firstInteraction = false;

      // Paddle config
      const PADDLE_EMOJI = '🤲';
      const PADDLE_SIZE = 56;       // dimensione emoji
      const PADDLE_W = 72;          // area di cattura
      const PADDLE_Y_FROM_BOTTOM = 60;

      // Particelle
      const particles = [];

      hudBest.textContent = best;
      paddleX = paddleTargetX = W / 2;

      // Spawn oggetto
      function spawnItem() {
        // 18% probabilità di oggetto cattivo
        const isBad = Math.random() < 0.18;
        let type;
        if (isBad) {
          type = BADS[Math.floor(Math.random() * BADS.length)];
        } else {
          // Pesi: somma w = 1 ca.
          const r = Math.random();
          let acc = 0;
          for (const g of GOODS) {
            acc += g.w;
            if (r <= acc) { type = g; break; }
          }
          if (!type) type = GOODS[0];
        }
        const size = isBad ? 32 : (type.pts >= 25 ? 36 : 38);
        items.push({
          x: 30 + Math.random() * (W - 60),
          y: -size,
          vy: baseFallSpeed * (0.85 + Math.random() * 0.4),
          vx: (Math.random() - 0.5) * 30,
          size,
          emoji: type.emoji,
          pts: isBad ? 0 : type.pts,
          isBad,
          rot: (Math.random() - 0.5) * 0.4,
          rotV: (Math.random() - 0.5) * 0.8,
        });
      }

      // Particelle (feedback cattura)
      function emitParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
          particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 180,
            vy: -50 - Math.random() * 160,
            life: 0,
            maxLife: 0.5 + Math.random() * 0.4,
            color,
            size: 3 + Math.random() * 3,
          });
        }
      }

      // Collisione paddle vs item
      function intersects(item) {
        const paddleLeft = paddleX - PADDLE_W / 2;
        const paddleRight = paddleX + PADDLE_W / 2;
        const paddleTop = H - PADDLE_Y_FROM_BOTTOM - PADDLE_SIZE / 2;
        const paddleBottom = H - PADDLE_Y_FROM_BOTTOM + PADDLE_SIZE / 2;
        return (
          item.x > paddleLeft &&
          item.x < paddleRight &&
          item.y > paddleTop &&
          item.y < paddleBottom
        );
      }

      // Input: posizione paddle
      function setPaddleFromClient(clientX) {
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        paddleTargetX = Math.max(PADDLE_W / 2, Math.min(W - PADDLE_W / 2, x));
        firstInteraction = true;
        touchHint.classList.add('hidden');
      }

      area.addEventListener('touchstart', e => {
        e.preventDefault();
        if (e.touches.length) setPaddleFromClient(e.touches[0].clientX);
      }, { passive: false });
      area.addEventListener('touchmove', e => {
        e.preventDefault();
        if (e.touches.length) setPaddleFromClient(e.touches[0].clientX);
      }, { passive: false });

      area.addEventListener('mousedown', e => setPaddleFromClient(e.clientX));
      area.addEventListener('mousemove', e => {
        if (e.buttons === 1) setPaddleFromClient(e.clientX);
      });

      // Tastiera (per desktop)
      const keys = {};
      window.addEventListener('keydown', e => {
        if (!running) return;
        keys[e.key] = true;
      });
      window.addEventListener('keyup', e => { keys[e.key] = false; });

      function updateLivesHUD() {
        let s = '';
        for (let i = 0; i < 3; i++) {
          s += i < lives ? '❤️' : '<span class="lost">❤️</span>';
        }
        hudLives.innerHTML = s;
      }

      function endGame() {
        running = false;
        if (score > best) {
          best = score;
          localStorage.setItem('bouquet_best', String(best));
          hudBest.textContent = best;
          overTitle.textContent = 'Nuovo record!';
          overMsg.textContent = `Hai battuto il tuo punteggio migliore! Riesci a fare ancora meglio?`;
        } else {
          overTitle.textContent = 'Bella partita!';
          overMsg.textContent = score >= 100
            ? 'Ottima coordinazione, riprova!'
            : 'Concentrati sui bouquet e gli anelli, fanno più punti!';
        }
        overScore.textContent = score;
        overOverlay.classList.add('show');
      }

      function reset() {
        items = [];
        particles.length = 0;
        score = 0;
        lives = 3;
        elapsed = 0;
        spawnInterval = 900;
        baseFallSpeed = 110;
        lastSpawn = 0;
        firstInteraction = false;
        paddleX = paddleTargetX = W / 2;
        hudScore.textContent = '0';
        updateLivesHUD();
      }

      function start() {
        reset();
        startOverlay.classList.remove('show');
        overOverlay.classList.remove('show');
        touchHint.classList.remove('hidden');
        running = true;
        lastTime = performance.now();
        requestAnimationFrame(loop);
      }

      startBtn.addEventListener('click', start);
      restartBtn.addEventListener('click', start);

      // Loop principale
      function loop(now) {
        if (!running) return;
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;
        elapsed += dt;

        // Difficoltà crescente
        spawnInterval = Math.max(380, 900 - elapsed * 8);
        baseFallSpeed = 110 + elapsed * 4;

        // Spawn
        lastSpawn += dt * 1000;
        if (lastSpawn >= spawnInterval) {
          spawnItem();
          lastSpawn = 0;
        }

        // Input tastiera
        if (keys['ArrowLeft']) paddleTargetX -= 300 * dt;
        if (keys['ArrowRight']) paddleTargetX += 300 * dt;
        paddleTargetX = Math.max(PADDLE_W / 2, Math.min(W - PADDLE_W / 2, paddleTargetX));

        // Movimento paddle smooth
        paddleX += (paddleTargetX - paddleX) * Math.min(1, dt * 16);

        // Update items
        for (let i = items.length - 1; i >= 0; i--) {
          const it = items[i];
          it.x += it.vx * dt;
          it.y += it.vy * dt;
          it.rot += it.rotV * dt;

          // Rimbalzo laterale
          if (it.x < 20 || it.x > W - 20) it.vx *= -1;

          // Collisione paddle
          if (intersects(it)) {
            if (it.isBad) {
              lives--;
              updateLivesHUD();
              emitParticles(it.x, it.y, '#d99a8b', 14);
              flash('#9E3D22');
              if (lives <= 0) {
                items.splice(i, 1);
                setTimeout(endGame, 100);
                return;
              }
            } else {
              score += it.pts;
              hudScore.textContent = score;
              emitParticles(it.x, it.y, '#E0BC72', 12);
            }
            items.splice(i, 1);
            continue;
          }

          // Uscita dal basso
          if (it.y > H + it.size) {
            if (!it.isBad) {
              // Hai mancato un oggetto buono
              lives--;
              updateLivesHUD();
              flash('#722B18');
              if (lives <= 0) {
                items.splice(i, 1);
                setTimeout(endGame, 100);
                return;
              }
            }
            items.splice(i, 1);
          }
        }

        // Update particelle
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.life += dt;
          if (p.life >= p.maxLife) { particles.splice(i, 1); continue; }
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 350 * dt;
        }

        // Render
        render();
        requestAnimationFrame(loop);
      }

      let flashColor = null;
      let flashAlpha = 0;
      function flash(color) {
        flashColor = color;
        flashAlpha = 0.35;
      }

      function render() {
        ctx.clearRect(0, 0, W, H);

        // Gradient soft glow al centro
        const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H));
        grad.addColorStop(0, 'rgba(200, 148, 58, 0.08)');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Items
        items.forEach(it => {
          ctx.save();
          ctx.translate(it.x, it.y);
          ctx.rotate(it.rot);
          ctx.font = `${it.size}px serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(it.emoji, 0, 0);
          ctx.restore();
        });

        // Particelle
        particles.forEach(p => {
          const t = p.life / p.maxLife;
          ctx.globalAlpha = 1 - t;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * (1 - t * 0.5), 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Paddle
        const py = H - PADDLE_Y_FROM_BOTTOM;
        // Ombra sotto
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.beginPath();
        ctx.ellipse(paddleX, py + PADDLE_SIZE / 2 + 4, PADDLE_W / 2, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        // Emoji
        ctx.font = `${PADDLE_SIZE}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(PADDLE_EMOJI, paddleX, py);

        // Flash
        if (flashAlpha > 0) {
          ctx.fillStyle = flashColor;
          ctx.globalAlpha = flashAlpha;
          ctx.fillRect(0, 0, W, H);
          ctx.globalAlpha = 1;
          flashAlpha -= 0.04;
        }
      }
    })();
  </script>
</body>

</html>
