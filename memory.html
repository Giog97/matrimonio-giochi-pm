<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#1E130C" />
  <title>Memory degli sposi · Pietro &amp; Martina</title>

  <link href="https://fonts.googleapis.com/css2?family=Diphylleia&display=swap" rel="stylesheet" />
  <link href="https://fonts.cdnfonts.com/css/brittany-signature" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    .memory-page {
      max-width: 560px;
      margin: 0 auto;
      padding: 1rem 1rem 3rem;
      position: relative;
      z-index: 1;
    }

    /* Statistiche partita */
    .stats-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: .5rem;
      margin: 1rem 0 1.4rem;
      padding: .8rem 1rem;
      background: var(--warm-white);
      border: 1px solid rgba(200, 148, 58, .3);
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(90, 60, 44, .08);
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .stat-label {
      font-family: 'Diphylleia', serif;
      font-size: .62rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: .15rem;
    }

    .stat-value {
      font-family: 'Diphylleia', serif;
      font-size: clamp(1.4rem, 5vw, 1.7rem);
      color: var(--rust);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat-divider {
      width: 1px;
      height: 32px;
      background: rgba(200, 148, 58, .3);
    }

    /* Griglia Memory */
    .memory-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(.4rem, 2vw, .7rem);
      perspective: 1000px;
      max-width: 480px;
      margin: 0 auto;
    }

    .mem-card {
      position: relative;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform .55s cubic-bezier(.5, 1.6, .4, 1);
      -webkit-tap-highlight-color: transparent;
    }

    .mem-card.flipped {
      transform: rotateY(180deg);
    }

    .mem-card.matched {
      transform: rotateY(180deg);
      animation: matchedPulse .8s ease;
    }

    @keyframes matchedPulse {

      0%,
      100% {
        transform: rotateY(180deg) scale(1);
      }

      50% {
        transform: rotateY(180deg) scale(1.08);
      }
    }

    .mem-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(90, 60, 44, .15);
      user-select: none;
    }

    .mem-back {
      background: linear-gradient(135deg, var(--gold-dark) 0%, var(--terracotta) 50%, var(--rust) 100%);
      border: 1.5px solid rgba(224, 188, 114, .35);
      font-family: 'Brittany Signature', 'Brittany', cursive;
      font-style: normal;
      font-size: clamp(1.4rem, 5.5vw, 2rem);
      color: rgba(247, 240, 227, .85);
      text-shadow: 0 2px 6px rgba(0, 0, 0, .25);
    }

    .mem-back::after {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(247, 240, 227, .25);
      border-radius: 10px;
      pointer-events: none;
    }

    .mem-front {
      background: var(--warm-white);
      border: 1.5px solid rgba(200, 148, 58, .45);
      transform: rotateY(180deg);
      font-size: clamp(2rem, 9vw, 3rem);
    }

    .mem-card.matched .mem-front {
      background: linear-gradient(135deg, var(--cream) 0%, var(--parchment) 100%);
      border-color: var(--gold);
      box-shadow: 0 4px 18px rgba(200, 148, 58, .4);
    }

    /* Overlay vittoria */
    .win-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30, 19, 12, .88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1.5rem;
    }

    .win-overlay.show {
      display: flex;
      animation: fadeIn .4s ease;
    }

    .win-card {
      background: var(--warm-white);
      border: 1.5px solid var(--gold);
      border-radius: 22px;
      padding: 2.2rem 1.8rem;
      text-align: center;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .3);
      animation: pop .6s ease both;
    }

    .win-emoji {
      font-size: 3.5rem;
      margin-bottom: .8rem;
      line-height: 1;
    }

    .win-title {
      font-family: 'Brittany Signature', 'Brittany', cursive;
      font-style: normal;
      font-size: clamp(2.2rem, 8vw, 2.8rem);
      color: var(--rust);
      line-height: 1;
      margin-bottom: .5rem;
    }

    .win-sub {
      font-family: 'Diphylleia', serif;
      font-size: .8rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 1.6rem;
    }

    .win-stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 1.8rem;
      padding: 1rem 0;
      border-top: 1px solid rgba(200, 148, 58, .25);
      border-bottom: 1px solid rgba(200, 148, 58, .25);
    }

    .win-buttons {
      display: flex;
      flex-direction: column;
      gap: .8rem;
      align-items: center;
    }
  </style>
</head>

<body>

  <canvas id="leaves-canvas" aria-hidden="true"></canvas>

  <header class="game-header">
    <a href="index.html" class="back-btn" aria-label="Torna al menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      Menu
    </a>
    <h1 class="game-title">Memory</h1>
  </header>

  <main class="memory-page">

    <div class="stats-bar" aria-live="polite">
      <div class="stat">
        <span class="stat-label">Tempo</span>
        <span class="stat-value" id="stat-time">00:00</span>
      </div>
      <div class="stat-divider" aria-hidden="true"></div>
      <div class="stat">
        <span class="stat-label">Mosse</span>
        <span class="stat-value" id="stat-moves">0</span>
      </div>
      <div class="stat-divider" aria-hidden="true"></div>
      <div class="stat">
        <span class="stat-label">Coppie</span>
        <span class="stat-value" id="stat-pairs">0/8</span>
      </div>
    </div>

    <div class="memory-grid" id="grid" role="grid" aria-label="Griglia Memory"></div>

  </main>

  <!-- Overlay vittoria -->
  <div class="win-overlay" id="winOverlay" role="dialog" aria-modal="true" aria-labelledby="winTitle">
    <div class="win-card">
      <div class="win-emoji" aria-hidden="true">🎉</div>
      <h2 class="win-title" id="winTitle">Bravo!</h2>
      <p class="win-sub">Hai trovato tutte le coppie</p>

      <div class="win-stats">
        <div class="stat">
          <span class="stat-label">Tempo</span>
          <span class="stat-value" id="win-time">00:00</span>
        </div>
        <div class="stat-divider" aria-hidden="true"></div>
        <div class="stat">
          <span class="stat-label">Mosse</span>
          <span class="stat-value" id="win-moves">0</span>
        </div>
      </div>

      <div class="win-buttons">
        <button class="btn-primary" id="playAgainBtn">Gioca ancora</button>
        <a href="index.html" class="btn-secondary">← Altri giochi</a>
      </div>
    </div>
  </div>

  <script>
    /* ── Falling Leaves ── */
    (function () {
      const canvas = document.getElementById('leaves-canvas');
      const ctx = canvas.getContext('2d');
      const SHAPES = ['🍂', '🍁', '🍃'];
      const LEAVES = [];
      const COUNT = window.innerWidth < 500 ? 12 : 22;
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);
      for (let i = 0; i < COUNT; i++) {
        LEAVES.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight * -1.5,
          size: 12 + Math.random() * 18,
          speed: .3 + Math.random() * .6,
          drift: (Math.random() - .5) * .7,
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - .5) * .022,
          emoji: SHAPES[Math.floor(Math.random() * SHAPES.length)],
          alpha: .18 + Math.random() * .3,
          swing: Math.random() * Math.PI * 2,
          swingS: .35 + Math.random() * .55,
        });
      }
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        LEAVES.forEach(l => {
          l.swing += .011 * l.swingS;
          l.x += l.drift + Math.sin(l.swing) * .55;
          l.y += l.speed;
          l.rot += l.rotV;
          if (l.y > canvas.height + 40) { l.y = -40; l.x = Math.random() * canvas.width; }
          ctx.save();
          ctx.translate(l.x, l.y);
          ctx.rotate(l.rot);
          ctx.globalAlpha = l.alpha;
          ctx.font = `${l.size}px serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(l.emoji, 0, 0);
          ctx.restore();
        });
        requestAnimationFrame(animate);
      }
      animate();
    })();

    /* ── Memory Game ── */
    (function () {
      // 8 simboli a tema matrimonio (= 8 coppie = 16 carte)
      const SYMBOLS = ['💍', '🥂', '💐', '🕊️', '🍂', '🍁', '👰', '🤵'];

      const grid = document.getElementById('grid');
      const statTime = document.getElementById('stat-time');
      const statMoves = document.getElementById('stat-moves');
      const statPairs = document.getElementById('stat-pairs');
      const winOverlay = document.getElementById('winOverlay');
      const winTime = document.getElementById('win-time');
      const winMoves = document.getElementById('win-moves');
      const playAgainBtn = document.getElementById('playAgainBtn');

      let flipped = [];        // carte attualmente girate (in attesa di confronto)
      let matched = 0;
      let moves = 0;
      let startTs = null;
      let timerId = null;
      let lock = false;

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function formatTime(ms) {
        const s = Math.floor(ms / 1000);
        const m = Math.floor(s / 60);
        const r = s % 60;
        return `${String(m).padStart(2, '0')}:${String(r).padStart(2, '0')}`;
      }

      function startTimer() {
        startTs = Date.now();
        timerId = setInterval(() => {
          statTime.textContent = formatTime(Date.now() - startTs);
        }, 250);
      }

      function stopTimer() {
        clearInterval(timerId);
        timerId = null;
      }

      function setup() {
        grid.innerHTML = '';
        flipped = [];
        matched = 0;
        moves = 0;
        statMoves.textContent = '0';
        statPairs.textContent = '0/8';
        statTime.textContent = '00:00';
        stopTimer();
        startTs = null;
        lock = false;

        const deck = shuffle([...SYMBOLS, ...SYMBOLS]);

        deck.forEach((sym, i) => {
          const card = document.createElement('div');
          card.className = 'mem-card';
          card.dataset.symbol = sym;
          card.dataset.index = i;
          card.setAttribute('role', 'gridcell');
          card.setAttribute('aria-label', 'Carta coperta');
          card.innerHTML = `
            <div class="mem-face mem-back" aria-hidden="true">P&amp;M</div>
            <div class="mem-face mem-front" aria-hidden="true">${sym}</div>
          `;
          card.addEventListener('click', () => onCardClick(card));
          grid.appendChild(card);
        });
      }

      function onCardClick(card) {
        if (lock) return;
        if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

        if (!startTs) startTimer();

        card.classList.add('flipped');
        flipped.push(card);

        if (flipped.length === 2) {
          moves++;
          statMoves.textContent = moves;
          const [a, b] = flipped;
          if (a.dataset.symbol === b.dataset.symbol) {
            // Match!
            setTimeout(() => {
              a.classList.add('matched');
              b.classList.add('matched');
              a.classList.remove('flipped');
              b.classList.remove('flipped');
              flipped = [];
              matched++;
              statPairs.textContent = `${matched}/8`;
              if (matched === 8) win();
            }, 280);
          } else {
            // No match - flip back
            lock = true;
            setTimeout(() => {
              a.classList.remove('flipped');
              b.classList.remove('flipped');
              flipped = [];
              lock = false;
            }, 850);
          }
        }
      }

      function win() {
        stopTimer();
        const finalTime = Date.now() - startTs;
        winTime.textContent = formatTime(finalTime);
        winMoves.textContent = moves;
        setTimeout(() => winOverlay.classList.add('show'), 600);
      }

      playAgainBtn.addEventListener('click', () => {
        winOverlay.classList.remove('show');
        setup();
      });

      setup();
    })();
  </script>
</body>

</html>
